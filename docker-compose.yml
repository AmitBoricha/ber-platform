services:
  backend:
    build: ./backend
    environment:
      DATABASE_URL: sqlite:///./ber.db
      SECRET_KEY: change-this-in-production
    ports:
      - "8000:8000"
    command: >
      sh -c "python -m app.seed && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build: ./frontend
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend
